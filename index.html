<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Mi Proyecto Web</title>
    <p>Este proyecto fue publicado usando GitHub.</p>
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">

        <h1>Sistema Web Interactivo</h1>

        <p>Ingrese su nombre:</p>

        <input type="text" id="nombre" placeholder="Tu nombre">

        <button onclick="saludar()">
            Saludar
        </button>
        <br>

        <button onclick="cambiarTema()">
            Cambiar Tema
        </button>

        <p id="resultado"></p>

    </div>

    <div class="container">
        <h2>Formulario de contacto</h2>
        <input type="email" id="correo" placeholder="Ingrese su correo">
        <button onclick="validarCorreo()">Validar correo</button>
        <p id="mensajeCorreo"></p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
